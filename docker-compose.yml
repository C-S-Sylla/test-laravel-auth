version: '3.8'

services:
  # Base de données
  db:
    image: mysql:8.0
    container_name: cyber_db
    restart: always
    environment:
      MYSQL_DATABASE: cyber_net
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  # Backend Laravel (Les fichiers sont maintenant stockés uniquement dans Docker)
  backend:
    build:
      context: ./backend
    container_name: cyber_backend
    volumes:
      - backend_files:/var/www # Utilise un volume interne super rapide
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: cyber_net
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - db

  # Serveur Web pour Laravel (Nginx)
  nginx:
    image: nginx:alpine
    container_name: cyber_nginx
    ports:
      - "8000:80"
    volumes:
      - backend_files:/var/www # Partage le même volume interne rapide
      - ./nginx/laravel.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  # Frontend React (Déjà optimisé)
  frontend:
    build:
      context: ./frontend
    container_name: cyber_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
  backend_files: # Ce volume est géré par Docker et tourne à pleine vitesse