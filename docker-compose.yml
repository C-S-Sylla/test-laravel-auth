version: '3.8'

services:
  web:
    build: .
    container_name: laravel_web
    ports:
      - "8000:80"

    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=database
      - DB_PORT=3306
      - DB_DATABASE=laravel_auth
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - database

  database:
    image: mysql:8.0
    container_name: laravel_db
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=laravel_auth
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: